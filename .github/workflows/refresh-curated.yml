name: Refresh Curated Photos

on:
  schedule:
    - cron: '0 6 1 * *'   # 6:00 AM UTC on the 1st of every month
  workflow_dispatch:        # also triggerable manually from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch curated photos from Pexels
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node .github/scripts/refresh-curated.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add curated.json
          git diff --staged --quiet || git commit -m "chore: refresh curated photos [skip ci]"
          git push
